name: Translate PR Agent Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  translate:
    if: github.event.comment.user.login == 'qodo-code-review[bot]' || contains(github.event.comment.body, '<!-- pr-agent')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Translate and comment
        uses: actions/github-script@v6
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body;
            if (!body || body.length < 2) return;

            const prompt = `以下のPRレビューコメントを日本語に翻訳してください。
            ルール：コードブロック（\`\`\`で囲んだ部分）とインラインコード（\`で囲んだ部分）は翻訳せずそのまま。マークダウンは保持。自然な文章部分のみ日本語に。\n\n${body}`;

            async function translateWithRetry(text, retries) {
              for (let i = 0; i < retries; i++) {
                const res = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                  }
                );
                if (res.status === 429) {
                  await new Promise(r => setTimeout(r, (i + 1) * 10000));
                  continue;
                }
                const json = await res.json();
                if (!res.ok) throw new Error(json.error?.message || res.statusText);
                return json.candidates[0].content.parts[0].text;
              }
              throw new Error('Translation failed after retries');
            }

            const translated = await translateWithRetry(prompt, 3);
            const commentBody = '<details>\n<summary>🇯🇵 日本語訳</summary>\n\n' + translated + '\n\n</details>';
            const commentId = context.payload.comment.id;

            if (context.eventName === 'pull_request_review_comment') {
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                comment_id: commentId,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
