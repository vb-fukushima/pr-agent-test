name: Translate PR Agent Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  translate:
    # PR Agentのコメントのみ対象
    if: github.event.comment.user.login == 'qodo-code-review[bot]'
        || contains(github.event.comment.body, '<!-- pr-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Translate and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body;

            const RULES = `ルール：コードブロック(\`\`\`)・インラインコード(\`)は翻訳しない。マークダウンは保持。自然言語のみ翻訳。`;

            // 1回のAPI呼び出しでベトナム語＋日本語を取得（RPM削減）
            const prompt = `以下のPRレビューコメントを、指定フォーマットで2つ翻訳してください。

${RULES}

出力は必ず次の2ブロックだけにしてください（見出しも含めてそのまま）：
---
## VI
（ここにベトナム語訳を1つで出力）
## JA
（ここに日本語訳を1つで出力）
---

対象テキスト：
${body}`;

            async function translateWithRetry(text, retries = 6) {
              const backoffSec = [15, 30, 45, 60, 75, 90];
              for (let i = 0; i < retries; i++) {
                const res = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}`,
                  {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text }] }]
                    })
                  }
                );
                if (res.status === 429) {
                  const wait = (backoffSec[i] || 60) * 1000;
                  console.log(`Rate limited. Retrying in ${backoffSec[i]}s...`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                const json = await res.json();
                if (!res.ok) throw new Error(json.error?.message || res.statusText);
                return json.candidates[0].content.parts[0].text;
              }
              throw new Error('Translation failed after retries');
            }

            const raw = await translateWithRetry(prompt);
            const viMatch = raw.match(/## VI\s*([\s\S]*?)(?=## JA|$)/i);
            const jaMatch = raw.match(/## JA\s*([\s\S]*?)(?=---|$)/i);
            const translatedVi = (viMatch && viMatch[1].trim()) || raw;
            const translatedJa = (jaMatch && jaMatch[1].trim()) || '(日本語訳の取得に失敗しました)';

            const commentBody = `🇻🇳 **Tiếng Việt**\n\n${translatedVi}\n\n---\n\n🇯🇵 **日本語**\n\n${translatedJa}`;
            const commentId = context.payload.comment.id;

            if (context.eventName === 'pull_request_review_comment') {
              // レビューコメントへの返信（in_reply_to で紐付け）
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                comment_id: commentId,
                body: commentBody
              });
            } else {
              // issueコメントへの返信（in_reply_to パラメータで紐付け）
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
                in_reply_to: commentId
              });
            }