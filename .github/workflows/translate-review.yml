name: Translate PR Agent Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  translate:
    # PR Agentのコメントのみ対象
    if: github.event.comment.user.login == 'qodo-code-review[bot]'
        || contains(github.event.comment.body, '<!-- pr-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Translate and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body;

            const RULES = `ルール：
            - コードブロック（\`\`\`で囲まれた部分）は翻訳せずそのままコピー
            - インラインコード（\`で囲まれた部分）は翻訳しない
            - マークダウンの構造・記号はそのまま保持
            - 自然言語の文章部分のみ翻訳`;

            async function translateWithRetry(text, retries = 3) {
              for (let i = 0; i < retries; i++) {
                const res = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}`,
                  {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text }] }]
                    })
                  }
                );
                if (res.status === 429) {
                  console.log(`Rate limited. Retrying in ${(i + 1) * 10}s...`);
                  await new Promise(r => setTimeout(r, (i + 1) * 10000));
                  continue;
                }
                const json = await res.json();
                return json.candidates[0].content.parts[0].text;
              }
              throw new Error('Translation failed after retries');
            }

            // 英語 → ベトナム語
            const promptVi = `以下のPRレビューコメントをベトナム語（Tiếng Việt）に翻訳してください。\n${RULES}\n\n${body}`;
            const translatedVi = await translateWithRetry(promptVi);

            // 英語 → 日本語（連続呼び出しでRPM対策のため少し待機）
            await new Promise(r => setTimeout(r, 1500));
            const promptJa = `以下のPRレビューコメントを日本語に翻訳してください。\n${RULES}\n\n${body}`;
            const translatedJa = await translateWithRetry(promptJa);

            // 1つの返信：上にベトナム語、区切り、下に日本語
            const commentBody = `🇻🇳 **Tiếng Việt**\n\n${translatedVi}\n\n---\n\n🇯🇵 **日本語**\n\n${translatedJa}`;
            const commentId = context.payload.comment.id;

            if (context.eventName === 'pull_request_review_comment') {
              // レビューコメントへの返信（in_reply_to で紐付け）
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                comment_id: commentId,
                body: commentBody
              });
            } else {
              // issueコメントへの返信（in_reply_to パラメータで紐付け）
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
                in_reply_to: commentId
              });
            }